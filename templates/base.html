<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{% block title %}CityPark • Ресторан{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600;700;800&display=swap"
          rel="stylesheet">

    <style>
        :root {
            --bg-deep: #070707;
            --bg-card: #111111;
            --bg-card-hover: #171717;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.72);
            --text-muted: rgba(255, 255, 255, 0.45);
            --gold: #d4af37;
            --gold-soft: rgba(212, 175, 55, 0.14);
            --border: rgba(255, 255, 255, 0.08);
            --border-gold: rgba(212, 175, 55, 0.25);
            --shadow-soft: 0 10px 40px rgba(0, 0, 0, 0.55);
            --shadow-gold: 0 15px 60px rgba(212, 175, 55, 0.12);
            --radius-sm: 12px;
            --radius-md: 18px;
            --radius-lg: 28px;
            --transition: 0.25s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: "Inter", sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            line-height: 1.6;
            font-size: 15px;
        }

        a {
            color: inherit;
            text-decoration: none;
            transition: var(--transition);
        }

        .container {
            width: min(1280px, 92%);
            margin: 0 auto;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(18px);
            background: rgba(7, 7, 7, 0.75);
            border-bottom: 1px solid var(--border);
        }

        .header-inner {
            min-height: 84px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
        }

        .logo {
            font-family: "Playfair Display", serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--gold);
            letter-spacing: -0.5px;
        }

        nav {
            display: flex;
            gap: 22px;
            align-items: center;
            flex-wrap: wrap;
        }

        nav a {
            font-size: 14px;
            color: var(--text-secondary);
        }

        nav a:hover, nav a.active {
            color: var(--gold);
        }

        .nav-link {
            position: relative;
            display: inline-flex;
            align-items: center;
            padding: 8px 0;
        }

        .nav-link::after {
            content: "";
            position: absolute;
            left: 50%;
            bottom: 0;
            width: 0;
            height: 2px;
            border-radius: 999px;
            background: linear-gradient(90deg, transparent, var(--gold), #f0e6b8, var(--gold), transparent);
            opacity: 0;
            transform: translateX(-50%);
            transition: width 0.28s ease, opacity 0.28s ease;
        }

        .nav-link:hover::after,
        .nav-link.active::after {
            width: 100%;
            opacity: 1;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 28px;
            border-radius: 999px;
            font-weight: 600;
            font-size: 14px;
            background: linear-gradient(135deg, #d4af37, #f0e6b8, #b8952a);
            color: #0a0a0a;
            border: none;
            box-shadow: var(--shadow-gold);
            transition: var(--transition);
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-gold);
            color: var(--text-primary);
            box-shadow: none;
        }

        .btn-outline:hover {
            border-color: var(--gold);
            color: var(--gold);
        }

        .btn-register {
            padding: 10px 18px;
            border-radius: 999px;
            background: var(--gold-soft);
            border: 1px solid var(--border-gold);
            color: var(--gold);
            font-weight: 600;
            font-size: 13px;
        }

        .btn-register:hover {
            background: rgba(212, 175, 55, 0.20);
            border-color: var(--gold);
            transform: translateY(-1px);
        }

        .nav-counter {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 999px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            font-size: 13px;
            color: var(--text-secondary);
        }

        .nav-counter:hover {
            border-color: var(--border-gold);
            color: var(--gold);
            background: var(--bg-card-hover);
        }

        .nav-counter span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 20px;
            height: 20px;
            background: var(--gold);
            color: #000;
            border-radius: 50%;
            padding: 2px 7px;
            font-size: 11px;
            font-weight: 700;
            transition: transform 0.2s ease;
        }

        .nav-counter span.counter-bump {
            animation: counterBump 0.32s ease;
        }

        @keyframes counterBump {
            0% {
                transform: scale(1);
            }
            45% {
                transform: scale(1.28);
            }
            100% {
                transform: scale(1);
            }
        }

        .section {
            padding: 90px 0;
        }

        .section-title {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-title h2 {
            font-family: "Playfair Display", serif;
            font-size: clamp(34px, 4vw, 54px);
            letter-spacing: -0.5px;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .section-title h2::after {
            content: "";
            display: block;
            width: 72px;
            height: 2px;
            margin: 18px auto 0;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .section-title p {
            color: var(--text-secondary);
            font-size: 16px;
        }

        footer {
            padding: 40px 0;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 1100px) {

            .container {
                width: 94%;
            }

            nav {
                gap: 16px;
                flex-wrap: wrap;
                justify-content: center;
            }

            .header-inner {
                gap: 18px;
            }
        }

        @media (max-width: 768px) {

            .header-inner {
                flex-direction: column;
                align-items: center;
                padding: 14px 0;
                gap: 12px;
            }

            .logo {
                font-size: 26px;
            }

            nav {
                width: 100%;
                justify-content: center;
                gap: 12px;
                flex-wrap: wrap;
            }

            .nav-link {
                padding: 6px 0;
            }

            .btn-register {
                padding: 8px 14px;
                font-size: 12px;
            }

            .nav-counter {
                padding: 8px 12px;
                font-size: 12px;
            }

            .nav-counter span {
                min-width: 18px;
                height: 18px;
                font-size: 10px;
            }

            .section {
                padding: 60px 0;
            }

            .section-title h2 {
                font-size: clamp(28px, 5vw, 40px);
            }

            .section-title p {
                font-size: 14px;
            }

            .btn {
                padding: 12px 22px;
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {

            nav {
                gap: 10px;
            }

            .nav-counter {
                width: 100%;
                justify-content: space-between;
            }

            .btn-register {
                width: 100%;
                text-align: center;
            }

            .header-inner {
                gap: 10px;
            }

            .section {
                padding: 50px 0;
            }

            body {
                font-size: 14px;
            }

            .section-title h2 {
                font-size: 28px;
            }

            .section-title p {
                font-size: 13px;
            }

            .logo {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
<header>
    <div class="container header-inner">
        <div class="logo">CityPark</div>
        <nav>
            <a href="{% url 'index' %}" class="nav-link {% if active_page == 'index' %}active{% endif %}">Главная</a>
            <a href="{% url 'menu' %}" class="nav-link {% if active_page == 'menu' %}active{% endif %}">Меню</a>
            <a href="{% url 'booking' %}" class="nav-link {% if active_page == 'booking' %}active{% endif %}">Бронирование</a>
            <a href="{% url 'about' %}" class="nav-link {% if active_page == 'about' %}active{% endif %}">О нас</a>
            <a href="{% url 'contacts' %}"
               class="nav-link {% if active_page == 'contacts' %}active{% endif %}">Контакты</a>

            {% if not user.is_authenticated %}
                <a href="{% url 'registration' %}" class="btn-register">Регистрация</a>
            {% endif %}

            <a href="{% url 'cart' %}" class="nav-counter">Корзина <span id="cartCount">0</span></a>
            <a href="{% url 'fav' %}" class="nav-counter">Избранное <span id="favCount">0</span></a>
            <a href="{% url 'profile' %}" class="btn-register">👤</a>
        </nav>
    </div>
</header>

<main>
    {% block content %}{% endblock %}
</main>

<footer>
    <div class="container">
        © 2026 CityPark - Все права защищены.
    </div>
</footer>

{% block scripts %}{% endblock %}
<script>
    (function () {
        const COUNTER_ENDPOINTS = {
            cart: "/cart/count/",
            fav: "/fav/count/"
        };

        function setCounterValue(elementId, value) {
            const element = document.getElementById(elementId);
            if (!element) return;

            const normalizedValue = Number.isFinite(Number(value)) ? Number(value) : 0;
            const previousValue = element.textContent;

            element.textContent = normalizedValue;

            if (String(previousValue) !== String(normalizedValue)) {
                element.classList.remove("counter-bump");
                void element.offsetWidth;
                element.classList.add("counter-bump");
            }
        }

        async function fetchCounter(type) {
            const endpoint = COUNTER_ENDPOINTS[type];
            const elementId = type === "cart" ? "cartCount" : "favCount";

            try {
                const response = await fetch(endpoint, {
                    cache: "no-store",
                    headers: {
                        "X-Requested-With": "XMLHttpRequest"
                    }
                });

                if (!response.ok) return;

                const data = await response.json();
                setCounterValue(elementId, data.count ?? 0);
            } catch (error) {
                // Не показываем ошибку пользователю, чтобы не ломать интерфейс.
            }
        }

        function updateCounters() {
            fetchCounter("cart");
            fetchCounter("fav");
        }

        function updateCountersWithDelay() {
            setTimeout(updateCounters, 120);
            setTimeout(updateCounters, 900);
        }

        window.updateCounters = updateCounters;
        window.refreshCounters = updateCounters;
        window.refreshCartCount = function () {
            fetchCounter("cart");
        };
        window.refreshFavCount = function () {
            fetchCounter("fav");
        };

        document.addEventListener("DOMContentLoaded", updateCounters);
        window.addEventListener("pageshow", updateCounters);

        document.addEventListener("cart:updated", function () {
            fetchCounter("cart");
        });
        document.addEventListener("fav:updated", function () {
            fetchCounter("fav");
        });
        document.addEventListener("favorites:updated", function () {
            fetchCounter("fav");
        });

        const originalFetch = window.fetch;
        window.fetch = async function () {
            const response = await originalFetch.apply(this, arguments);

            try {
                const request = arguments[0];
                const options = arguments[1] || {};
                const url = typeof request === "string" ? request : request.url;
                const method = String(options.method || request.method || "GET").toUpperCase();
                const touchesCartOrFav = /\/(cart|fav|favorite|favorites)\//.test(url);
                const isCounterRequest = /\/(cart|fav)\/count\/?/.test(url);

                if (touchesCartOrFav && !isCounterRequest && method !== "GET") {
                    updateCountersWithDelay();
                }
            } catch (error) {
                // Игнорируем, если запрос не относится к корзине или избранному.
            }

            return response;
        };

        const originalOpen = XMLHttpRequest.prototype.open;
        const originalSend = XMLHttpRequest.prototype.send;

        XMLHttpRequest.prototype.open = function (method, url) {
            this._cityparkCounterMethod = method;
            this._cityparkCounterUrl = url;
            return originalOpen.apply(this, arguments);
        };

        XMLHttpRequest.prototype.send = function () {
            this.addEventListener("loadend", function () {
                try {
                    const url = String(this._cityparkCounterUrl || "");
                    const method = String(this._cityparkCounterMethod || "GET").toUpperCase();
                    const touchesCartOrFav = /\/(cart|fav|favorite|favorites)\//.test(url);
                    const isCounterRequest = /\/(cart|fav)\/count\/?/.test(url);

                    if (touchesCartOrFav && !isCounterRequest && method !== "GET") {
                        updateCountersWithDelay();
                    }
                } catch (error) {
                    // Игнорируем, если запрос не относится к корзине или избранному.
                }
            });

            return originalSend.apply(this, arguments);
        };
    })();
</script>
</body>
</html>
