{% extends 'base.html' %}

{% block title %}Корзина • CityPark{% endblock %}

{% block content %}

<style>
    .cart-page {
        padding: 80px 0;
    }

    .cart-title {
        text-align: center;
        font-family: "Playfair Display", serif;
        font-size: clamp(40px, 5vw, 56px);
        color: var(--gold);
        margin-bottom: 50px;
    }

    .cart-box {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 36px;
        padding: 40px;
        box-shadow: var(--shadow-soft);
    }

    /* ITEM */
    .cart-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 24px;
        padding: 24px 0;
        border-bottom: 1px solid var(--border);
        transition: 0.25s ease;
    }

    .cart-item:hover {
        background: rgba(255,255,255,0.02);
    }

    .cart-left {
        display: flex;
        align-items: center;
        gap: 18px;
    }

    .cart-image {
        width: 88px;
        height: 88px;
        border-radius: 18px;
        object-fit: cover;
        border: 1px solid var(--border);
        background: #111;
    }

    .cart-info h3 {
        font-family: "Playfair Display", serif;
        font-size: 20px;
        margin-bottom: 6px;
        color: var(--text-primary);
    }

    .cart-info p {
        font-size: 13px;
        color: var(--text-muted);
    }

    /* QTY */
    .qty {
        display: flex;
        align-items: center;
        border: 1px solid var(--border);
        border-radius: 999px;
        overflow: hidden;
        background: var(--bg-deep);
    }

    .qty button {
        width: 40px;
        height: 40px;
        background: transparent;
        border: none;
        color: var(--gold);
        cursor: pointer;
        transition: 0.2s;
        font-size: 18px;
    }

    .qty button:hover {
        background: rgba(212,175,55,0.08);
    }

    .qty span {
        width: 42px;
        text-align: center;
        color: var(--text-primary);
        font-weight: 600;
    }

    .price {
        font-size: 20px;
        font-weight: 700;
        color: var(--gold);
        min-width: 90px;
        text-align: right;
    }

    .remove {
        border: 1px solid rgba(255,80,80,0.25);
        background: rgba(255,80,80,0.08);
        color: #ff7a7a;
        padding: 10px 14px;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.2s;
    }

    .remove:hover {
        background: rgba(255,80,80,0.15);
    }

    /* BOTTOM */
    .cart-bottom {
        margin-top: 35px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 20px;
    }

    .total {
        font-size: 14px;
        color: var(--text-muted);
    }

    .total h2 {
        font-family: "Playfair Display", serif;
        font-size: 42px;
        color: var(--gold);
        margin-top: 6px;
    }

    /* BUTTONS */
    .btn {
        padding: 14px 26px;
        border-radius: 999px;
        border: none;
        cursor: pointer;
        font-weight: 600;
        font-size: 14px;
        transition: 0.25s ease;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }

    .btn-primary {
        background: linear-gradient(135deg, #d4af37, #f0e6b8, #b8952a);
        color: #0a0a0a;
        box-shadow: var(--shadow-gold);
    }

    .btn-outline {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-secondary);
    }

    .btn-danger {
        background: rgba(255,80,80,0.08);
        border: 1px solid rgba(255,80,80,0.25);
        color: #ff7a7a;
    }

    .btn:hover {
        transform: translateY(-2px);
    }

    /* EMPTY */
    .empty {
        text-align: center;
        padding: 80px 20px;
        color: var(--text-muted);
    }

    .empty h2 {
        font-family: "Playfair Display", serif;
        color: var(--gold);
        font-size: 34px;
        margin-bottom: 10px;
    }

    /* MOBILE */
    @media (max-width: 768px) {
        .cart-item {
            flex-direction: column;
            align-items: flex-start;
        }

        .cart-bottom {
            flex-direction: column;
            align-items: stretch;
        }

        .price {
            text-align: left;
        }
    }
</style>

<section class="cart-page">

<div class="container">

    <div class="cart-title">Ваша корзина</div>

    <div class="cart-box">

        <div id="cart-items"></div>

        <div class="cart-bottom">

            <div class="total">
                <div>Общая сумма</div>
                <h2 id="total">0 ₽</h2>
            </div>

            <div style="display:flex; gap:12px; flex-wrap:wrap;">

                <button onclick="clearCart()" class="btn btn-danger">
                    Очистить
                </button>

                <a href="{% url 'index' %}" class="btn btn-outline">
                    Продолжить
                </a>

                <button onclick="checkout()" class="btn btn-primary">
                    Оформить заказ
                </button>

            </div>

        </div>

    </div>

</div>

</section>

<script>
function showToast(msg){
    const t=document.createElement('div');
    t.textContent=msg;
    t.style.position="fixed";
    t.style.bottom="20px";
    t.style.left="50%";
    t.style.transform="translateX(-50%)";
    t.style.background="var(--bg-card)";
    t.style.border="1px solid var(--border-gold)";
    t.style.padding="12px 20px";
    t.style.borderRadius="999px";
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),2000);
}

function loadCart(){
    let cart=JSON.parse(localStorage.getItem('cart')||'[]');
    let container=document.getElementById('cart-items');
    let total=0;

    if(cart.length===0){
        container.innerHTML=`
        <div class="empty">
            <h2>Корзина пуста</h2>
            <p>Добавьте блюда из меню</p>
        </div>`;
        document.getElementById('total').innerText="0 ₽";
        return;
    }

    let html="";

    cart.forEach((item,i)=>{
        let qty=item.quantity||1;
        let sum=item.price*qty;
        total+=sum;

        html+=`
        <div class="cart-item">

            <div class="cart-left">

                <img class="cart-image"
                     src="${item.image||'https://via.placeholder.com/100'}">

                <div class="cart-info">
                    <h3>${item.name}</h3>
                    <p>${item.price} ₽ / шт</p>
                </div>

            </div>

            <div class="qty">
                <button onclick="changeQty(${i},-1)">−</button>
                <span>${qty}</span>
                <button onclick="changeQty(${i},1)">+</button>
            </div>

            <div class="price">${sum} ₽</div>

            <button class="remove" onclick="removeItem(${i})">✕</button>

        </div>`;
    });

    container.innerHTML=html;
    document.getElementById('total').innerText=total+" ₽";
}

function changeQty(i,d){
    let cart=JSON.parse(localStorage.getItem('cart')||'[]');
    cart[i].quantity=(cart[i].quantity||1)+d;

    if(cart[i].quantity<=0){
        cart.splice(i,1);
        showToast("Удалено");
    }

    localStorage.setItem('cart',JSON.stringify(cart));
    loadCart();
}

function removeItem(i){
    let cart=JSON.parse(localStorage.getItem('cart')||'[]');
    cart.splice(i,1);
    localStorage.setItem('cart',JSON.stringify(cart));
    showToast("Удалено");
    loadCart();
}

function clearCart(){
    localStorage.removeItem('cart');
    showToast("Корзина очищена");
    loadCart();
}

function checkout(){
    let cart=JSON.parse(localStorage.getItem('cart')||'[]');

    fetch("/checkout/",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "X-CSRFToken":getCookie("csrftoken")
        },
        body:JSON.stringify({cart})
    })
    .then(r=>r.json())
    .then(d=>{
        if(d.status==="ok"){
            localStorage.removeItem("cart");
            window.location.href="/order-success/"+d.order_id;
        }
    });
}

function getCookie(name){
    let v=null;
    document.cookie.split(";").forEach(c=>{
        c=c.trim();
        if(c.startsWith(name+"=")){
            v=decodeURIComponent(c.split("=")[1]);
        }
    });
    return v;
}

loadCart();
updateCounters();
</script>

{% endblock %}
